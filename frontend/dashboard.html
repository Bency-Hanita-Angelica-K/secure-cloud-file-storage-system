<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="dashboard">

<div class="header">

<h2>

My Files

</h2>

<button
onclick="logout()">

Logout

</button>

</div>

<div class="upload-box">

<input
type="file"
id="fileInput">

<br><br>

<button
onclick="uploadFile()">

Upload File

</button>

</div>

<input
type="text"
id="searchInput"
placeholder="Search Files">

<br><br>

<table>

<thead>

<tr>

<th>File Name</th>

<th>Download</th>

<th>Delete</th>

</tr>

</thead>

<tbody
id="fileTable">

</tbody>

</table>

</div>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>

</body>

</html>
